# Minimal 1-node in-memory cluster (dev/test)
# Prerequisites: kubectl create namespace aerospike
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-basic
  namespace: aerospike
spec:
  size: 1              # CE only: max 8 nodes total
  image: aerospike:ce-8.1.1.1  # CE image from Docker Hub

  aerospikeConfig:
    service:
      cluster-name: aerospike-basic  # Must match CR name for mesh discovery
      proto-fd-max: 15000            # auto-set by webhook if omitted

    network:
      service:
        address: any   # Listen on all interfaces
        port: 3000     # auto-set by webhook if omitted
      heartbeat:
        mode: mesh     # auto-set by webhook if omitted; mesh required for K8s
        port: 3002     # auto-set by webhook if omitted
      fabric:
        address: any
        port: 3001     # auto-set by webhook if omitted

    namespaces:          # CE only: max 2 namespaces
      - name: test
        replication-factor: 1  # Must be 1 for single-node cluster
        storage-engine:
          type: memory         # Pure in-memory; data lost on pod restart
          data-size: 1073741824  # 1 GiB

    logging:
      - name: /var/log/aerospike/aerospike.log
        context: any info      # Log all contexts at info level
