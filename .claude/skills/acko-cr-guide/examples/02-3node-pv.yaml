# 3-Node cluster with PersistentVolume storage (staging/production baseline)
# Prerequisites: kubectl create namespace aerospike
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-3node
  namespace: aerospike
spec:
  size: 3               # 3 Aerospike server pods
  image: aerospike:ce-8.1.1.1

  podSpec:
    aerospikeContainer:
      resources:
        requests:
          memory: "2Gi"   # Guaranteed memory for scheduling
          cpu: "1"        # 1 CPU core requested
        limits:
          memory: "4Gi"   # Hard memory ceiling
          cpu: "2"        # Hard CPU ceiling

  storage:
    volumes:
      - name: data-vol
        source:
          persistentVolume:
            storageClass: standard   # Use your cluster's storage class
            size: 10Gi               # PVC size per pod
            volumeMode: Filesystem
        aerospike:
          path: /opt/aerospike/data  # Mount path inside the container
        cascadeDelete: true          # PVCs deleted when CR is deleted

      - name: workdir
        source:
          emptyDir: {}               # Ephemeral; wiped on pod restart
        aerospike:
          path: /opt/aerospike/work  # Aerospike work directory

  aerospikeConfig:
    service:
      cluster-name: aerospike-3node
      proto-fd-max: 15000

    network:
      service:
        address: any
        port: 3000
      heartbeat:
        mode: mesh
        port: 3002
      fabric:
        address: any
        port: 3001

    namespaces:
      - name: testns
        replication-factor: 2  # Each record stored on 2 of the 3 nodes
        storage-engine:
          type: device
          file: /opt/aerospike/data/testns.dat  # File on the persistent volume
          filesize: 4294967296  # 4 GiB — max size of the data file

    logging:
      - name: /var/log/aerospike/aerospike.log
        context: any info
