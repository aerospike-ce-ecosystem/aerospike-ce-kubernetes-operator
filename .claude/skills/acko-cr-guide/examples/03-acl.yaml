# 3-Node cluster with ACL (Access Control) enabled
# Prerequisites:
#   kubectl create namespace aerospike
#   kubectl -n aerospike create secret generic aerospike-admin-secret --from-literal=password='admin123'
#   kubectl -n aerospike create secret generic aerospike-reader-secret --from-literal=password='reader123'
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-acl
  namespace: aerospike
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  # Operator manages roles/users declaratively at reconciliation time
  aerospikeAccessControl:
    roles:
      - name: reader             # Custom role with read-only access
        privileges:
          - read                 # Grants read across all namespaces
      - name: writer             # Custom role with read-write access
        privileges:
          - read-write
    users:
      - name: admin              # Required: operator management user
        roles:
          - sys-admin            # Built-in: full system administration
          - user-admin           # Built-in: manage users and roles
        secretName: aerospike-admin-secret   # K8s Secret with 'password' key
      - name: reader-user        # Application-level read-only user
        roles:
          - reader               # References the custom role above
        secretName: aerospike-reader-secret

  storage:
    volumes:
      - name: data-vol
        source:
          persistentVolume:
            storageClass: standard
            size: 10Gi
        aerospike:
          path: /opt/aerospike/data
        cascadeDelete: true

  aerospikeConfig:
    service:
      cluster-name: aerospike-acl
      proto-fd-max: 15000

    security:                    # Enables authentication + RBAC
      enable-quotas: false       # Disable rate/quota enforcement (optional)

    network:
      service:
        address: any
        port: 3000
      heartbeat:
        mode: mesh
        port: 3002
      fabric:
        address: any
        port: 3001

    namespaces:
      - name: testns
        replication-factor: 2
        storage-engine:
          type: device
          file: /opt/aerospike/data/testns.dat
          filesize: 4294967296  # 4 GiB

    logging:
      - name: /var/log/aerospike/aerospike.log
        context: any info
