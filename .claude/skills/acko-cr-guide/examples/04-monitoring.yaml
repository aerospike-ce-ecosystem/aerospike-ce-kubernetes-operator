# 3-Node cluster with Prometheus monitoring (exporter sidecar + ServiceMonitor + alerts)
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-monitoring
  namespace: aerospike
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  monitoring:
    enabled: true                                        # Inject Prometheus exporter sidecar
    exporterImage: aerospike/aerospike-prometheus-exporter:v1.16.1
    port: 9145                                           # Exporter metrics port
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    env:
      - name: AS_STAT_NAMESPACES                         # Restrict stats to this namespace
        value: "test"
    metricLabels:                                        # Labels added to all exported metrics
      environment: production
      team: platform
    serviceMonitor:
      enabled: true                                      # Create Prometheus Operator ServiceMonitor
      interval: 30s                                      # Scrape interval
      labels:
        release: prometheus                              # Label for Prometheus to discover this monitor
    prometheusRule:
      enabled: true                                      # Create default PrometheusRule alerts
      labels:
        release: prometheus

  aerospikeConfig:
    namespaces:
      - name: test
        replication-factor: 2
        storage-engine:
          type: memory
          data-size: 2147483648  # 2 GiB

  storage:
    volumes:
      - name: workdir
        source:
          persistentVolume:
            storageClass: standard
            size: 10Gi
        aerospike:
          path: /opt/aerospike
