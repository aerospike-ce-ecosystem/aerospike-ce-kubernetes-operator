# Advanced storage: global policies, block device, hostPath, CSI, local PV, sidecar mounts
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-storage-advanced
  namespace: aerospike
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  storage:
    # Global volume policies — applied to all volumes unless overridden per-volume
    filesystemVolumePolicy:
      initMethod: deleteFiles         # Clear files on init
      wipeMethod: deleteFiles         # Clear files on wipe
      cascadeDelete: true
    blockVolumePolicy:
      initMethod: blkdiscard          # Fast block-level discard
      wipeMethod: blkdiscardWithHeaderCleanup

    # Local storage classes: PVCs deleted before pod restart for these classes
    localStorageClasses:
      - local-path
      - openebs-hostpath
    deleteLocalStorageOnRestart: true

    cleanupThreads: 2                 # Parallel threads for volume cleanup

    volumes:
      # PVC with custom labels/annotations on the PVC itself
      - name: data-vol
        source:
          persistentVolume:
            storageClass: standard
            size: 50Gi
            volumeMode: Filesystem
            metadata:
              labels:
                app.kubernetes.io/data-tier: "aerospike"
                backup-policy: "daily"
              annotations:
                volume.kubernetes.io/storage-provisioner: "ebs.csi.aws.com"
        aerospike:
          path: /opt/aerospike/data
        initMethod: dd                # Per-volume override (overrides global policy)

      # Block device volume — uses blockVolumePolicy defaults
      - name: sindex-vol
        source:
          persistentVolume:
            storageClass: fast-ssd
            size: 20Gi
            volumeMode: Block          # Raw block device (not a filesystem)
        aerospike:
          path: /opt/aerospike/sindex
        # initMethod/wipeMethod not set -> falls back to blockVolumePolicy

      # Shared emptyDir mounted into a sidecar as read-only
      - name: shared-data
        source:
          emptyDir: {}
        aerospike:
          path: /opt/aerospike/shared
          readOnly: false
          subPath: "aerospike-data"    # Mount a subdirectory of the volume
        sidecars:
          - containerName: aerospike-prometheus-exporter
            path: /shared
            readOnly: true             # Sidecar gets read-only access

      # HostPath — dev/testing only; not portable across nodes
      - name: host-logs
        source:
          hostPath:
            path: /var/log/aerospike
            type: DirectoryOrCreate
        aerospike:
          path: /opt/aerospike/logs

      # CSI volume with HostToContainer mount propagation
      - name: csi-data
        source:
          persistentVolume:
            storageClass: csi-driver
            size: 100Gi
        aerospike:
          path: /opt/aerospike/csi
          mountPropagation: HostToContainer

      # Local PV — matched by localStorageClasses; PVC deleted on pod restart
      - name: local-data
        source:
          persistentVolume:
            storageClass: local-path
            size: 10Gi
        aerospike:
          path: /opt/aerospike/local
        initMethod: deleteFiles
        wipeMethod: deleteFiles

      # Volume with per-volume wipeMethod override
      - name: temp-data
        source:
          persistentVolume:
            storageClass: standard
            size: 5Gi
        aerospike:
          path: /opt/aerospike/temp
        wipeMethod: headerCleanup
        cascadeDelete: true

  aerospikeConfig:
    service:
      cluster-name: storage-advanced-demo
    namespaces:
      - name: test
        memory-size: 1073741824        # 1 GiB index memory budget
        replication-factor: 2
        storage-engine:
          type: device
          devices:
            - /opt/aerospike/data/test.dat
          filesize: 4294967296         # 4 GiB
          data-in-memory: true         # Cache all data in RAM for read performance
