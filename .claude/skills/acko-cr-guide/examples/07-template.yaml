# [1] AerospikeClusterTemplate (prod): hard-rack — production template
apiVersion: acko.io/v1alpha1
kind: AerospikeClusterTemplate
metadata:
  name: hard-rack
  namespace: default
  labels:
    app.kubernetes.io/profile: hard-rack
spec:
  image: aerospike:ce-8.1.1.1
  size: 6

  monitoring:
    enabled: true
    port: 9145
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    serviceMonitor:
      enabled: true
      interval: 30s

  aerospikeNetworkPolicy:
    accessType: pod
    alternateAccessType: pod
    fabricType: pod

  scheduling:
    podAntiAffinityLevel: required  # Hard anti-affinity: one pod per node
    tolerations:
      - key: "aerospike"
        operator: "Exists"
        effect: "NoSchedule"
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "aerospike"
                operator: In
                values:
                  - "true"

  storage:
    storageClassName: local-path
    localPVRequired: true
    resources:
      requests:
        storage: 100Gi

  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"              # Guaranteed QoS: requests == limits
      memory: "4Gi"

  rackConfig:
    maxRacksPerNode: 1

  aerospikeConfig:
    service:
      proto-fd-max: 15000
    namespaceDefaults:
      data-size: 2147483648  # 2 GiB
      replication-factor: 2
    network:
      heartbeat:
        mode: mesh
        interval: 150
        timeout: 10

---
# [2] AerospikeCluster using the template with overrides
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: prod-cluster
  namespace: default
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  templateRef:
    name: hard-rack           # Template snapshot copied at creation time

  # Override only what differs from the template
  overrides:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "2Gi"

  aerospikeConfig:
    namespaces:
      - name: data
        storage-engine:
          type: memory
          data-size: 1073741824  # 1 GiB — overrides template namespaceDefaults

# Resync after template changes:
#   kubectl annotate aerospikecluster prod-cluster acko.io/resync-template=true
