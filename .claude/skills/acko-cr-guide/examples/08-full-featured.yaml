# Full-featured: 3-node + PV + ACL + monitoring + multi-rack + PDB + dynamic config
# Prerequisites:
#   kubectl create namespace aerospike
#   kubectl -n aerospike create secret generic aerospike-admin-secret --from-literal=password='admin123'
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-full
  namespace: aerospike
spec:
  size: 3              # CE only: max 8 nodes
  image: aerospike:ce-8.1.1.1

  paused: false                    # Set true to pause all reconciliation
  rollingUpdateBatchSize: 1        # Restart N pods per batch (default: 1)
  disablePDB: false                # Auto-create PodDisruptionBudget
  enableDynamicConfigUpdate: true  # Apply config changes without pod restart

  podSpec:
    aerospikeContainer:
      resources:
        requests:
          memory: "4Gi"
          cpu: "2"
        limits:
          memory: "4Gi"   # Guaranteed QoS: requests == limits
          cpu: "2"

  rackConfig:
    namespaces:
      - production
    racks:
      - id: 1
        zone: us-east1-a
      - id: 2
        zone: us-east1-b
      - id: 3
        zone: us-east1-c

  monitoring:
    enabled: true
    exporterImage: aerospike/aerospike-prometheus-exporter:v1.16.1
    port: 9145
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    metricLabels:
      environment: production
    serviceMonitor:
      enabled: true
      interval: 30s
      labels:
        release: prometheus
    prometheusRule:
      enabled: true
      labels:
        release: prometheus

  aerospikeAccessControl:
    roles:
      - name: app-writer
        privileges:
          - read-write
    users:
      - name: admin
        roles:
          - sys-admin
          - user-admin
        secretName: aerospike-admin-secret

  storage:
    filesystemVolumePolicy:
      initMethod: deleteFiles
      cascadeDelete: true
    volumes:
      - name: data-vol
        source:
          persistentVolume:
            storageClass: standard
            size: 50Gi
        aerospike:
          path: /opt/aerospike/data
        cascadeDelete: true
      - name: workdir
        source:
          emptyDir: {}
        aerospike:
          path: /opt/aerospike/work

  aerospikeConfig:
    service:
      cluster-name: aerospike-full
      proto-fd-max: 15000

    security:
      enable-quotas: false

    network:
      service:
        address: any
        port: 3000
      heartbeat:
        mode: mesh
        port: 3002
      fabric:
        address: any
        port: 3001

    namespaces:
      - name: production
        replication-factor: 2
        storage-engine:
          type: device
          file: /opt/aerospike/data/production.dat
          filesize: 42949672960  # 40 GiB
          data-in-memory: true

    logging:
      - name: /var/log/aerospike/aerospike.log
        context: any info
