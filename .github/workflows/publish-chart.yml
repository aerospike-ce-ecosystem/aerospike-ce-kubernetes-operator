name: Publish Helm Chart

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "charts/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set chart version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${TAG}/" charts/aerospike-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" charts/aerospike-operator/Chart.yaml

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package charts/aerospike-operator
          helm push aerospike-operator-*.tgz oci://ghcr.io/${OWNER,,}
        env:
          OWNER: ${{ github.repository_owner }}
