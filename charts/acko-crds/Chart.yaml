apiVersion: v2
name: acko-crds
description: CustomResourceDefinitions for the Aerospike CE Kubernetes Operator (acko.io group)
type: application
version: 0.1.0
kubeVersion: ">=1.26.0-0"
home: https://github.com/kimsoungryoul/aerospike-ce-kubernetes-operator
sources:
  - https://github.com/kimsoungryoul/aerospike-ce-kubernetes-operator
keywords:
  - aerospike
  - crd
  - operator
  - nosql
  - kubernetes
maintainers:
  - name: kimsoungryoul
    url: https://github.com/kimsoungryoul
annotations:
  artifacthub.io/crds: |
    - kind: AerospikeCECluster
      version: v1alpha1
      name: aerospikececlusters.acko.io
      displayName: Aerospike CE Cluster
    - kind: AerospikeCEClusterTemplate
      version: v1alpha1
      name: aerospikececlustertemplates.acko.io
      displayName: Aerospike CE Cluster Template
