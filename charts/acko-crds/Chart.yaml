apiVersion: v2
name: acko-crds
description: CustomResourceDefinitions for the Aerospike CE Kubernetes Operator (acko.io group)
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.26.0-0"
home: https://github.com/kimsoungryoul/aerospike-ce-kubernetes-operator
sources:
  - https://github.com/kimsoungryoul/aerospike-ce-kubernetes-operator
keywords:
  - aerospike
  - crd
  - operator
  - nosql
  - kubernetes
maintainers:
  - name: kimsoungryoul
    url: https://github.com/kimsoungryoul
annotations:
  artifacthub.io/crds: |
    - kind: AerospikeCluster
      version: v1alpha1
      name: aerospikeclusters.acko.io
      displayName: Aerospike Cluster
    - kind: AerospikeClusterTemplate
      version: v1alpha1
      name: aerospikeclustertemplates.acko.io
      displayName: Aerospike Cluster Template
