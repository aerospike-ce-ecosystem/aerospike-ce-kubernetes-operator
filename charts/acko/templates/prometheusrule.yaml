{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "acko.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acko.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: acko.rules
      rules:
        {{- if .Values.prometheusRule.rules }}
        {{- toYaml .Values.prometheusRule.rules | nindent 8 }}
        {{- else }}
        # -- Operator pod is down
        - alert: AerospikeOperatorDown
          expr: |
            absent(up{job="{{ include "acko.metricsServiceName" . }}"} == 1)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Aerospike Operator is down"
            description: "The Aerospike Kubernetes Operator has been unreachable for more than 5 minutes."
        # -- High reconciliation error rate
        - alert: AerospikeOperatorReconcileErrors
          expr: |
            rate(controller_runtime_reconcile_errors_total{controller="aerospikecluster"}[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Aerospike operator reconcile errors detected"
            description: "The Aerospike operator has been producing reconciliation errors for more than 15 minutes."
        # -- Reconciliation taking too long
        - alert: AerospikeOperatorSlowReconcile
          expr: |
            histogram_quantile(0.99, rate(controller_runtime_reconcile_time_seconds_bucket{controller="aerospikecluster"}[5m])) > 60
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Aerospike operator reconciliation is slow"
            description: "The 99th percentile reconciliation time exceeds 60 seconds."
        # -- Work queue depth growing
        - alert: AerospikeOperatorWorkQueueDepth
          expr: |
            workqueue_depth{name="aerospikecluster"} > 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Aerospike operator work queue depth is high"
            description: "The controller work queue depth has been above 10 for more than 10 minutes."
        # -- Operator high memory usage
        - alert: AerospikeOperatorHighMemory
          expr: |
            container_memory_working_set_bytes{container="manager", pod=~"{{ include "acko.fullname" . }}.*"} > 256 * 1024 * 1024
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Aerospike operator memory usage is high"
            description: "The Aerospike operator is using more than 256Mi of memory."
        # -- Operator pod restarts
        - alert: AerospikeOperatorPodRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total{container="manager", pod=~"{{ include "acko.fullname" . }}.*"}[1h]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Aerospike operator pod is restarting frequently"
            description: "The Aerospike operator pod has restarted more than 3 times in the last hour."
        {{- end }}
{{- end }}
