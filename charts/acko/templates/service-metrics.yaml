apiVersion: v1
kind: Service
metadata:
  name: {{ include "acko.metricsServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acko.labels" . | nindent 4 }}
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    {{- include "acko.selectorLabels" . | nindent 4 }}
