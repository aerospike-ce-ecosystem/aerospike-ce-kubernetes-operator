{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "acko.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acko.labels" . | nindent 4 }}
spec:
  ports:
    - name: webhook
      port: 443
      protocol: TCP
      targetPort: {{ .Values.webhook.port }}
  selector:
    {{- include "acko.selectorLabels" . | nindent 4 }}
{{- end }}
