{{- if and .Values.ui.enabled .Values.ui.rbac.create .Values.ui.k8s.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "acko.ui.fullname" . }}
  labels:
    {{- include "acko.ui.labels" . | nindent 4 }}
rules:
  - apiGroups: ["acko.io"]
    resources: ["aerospikeclusters"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["acko.io"]
    resources: ["aerospikeclusters/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["list"]
{{- end }}
