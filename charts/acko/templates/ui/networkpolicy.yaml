{{- if and .Values.ui.enabled .Values.ui.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "acko.ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acko.ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "acko.ui.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.ui.service.frontendPort }}
          protocol: TCP
        - port: {{ .Values.ui.service.backendPort }}
          protocol: TCP
      {{- with .Values.ui.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # DNS (restricted to kube-system namespace)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # K8s API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Aerospike clusters (within cluster network)
    - ports:
        - port: {{ .Values.ui.aerospikePorts.service }}
          protocol: TCP
        - port: {{ .Values.ui.aerospikePorts.fabric }}
          protocol: TCP
        - port: {{ .Values.ui.aerospikePorts.heartbeat }}
          protocol: TCP
    {{- if not .Values.ui.postgresql.enabled }}
    # External PostgreSQL
    - ports:
        - port: 5432
          protocol: TCP
    {{- end }}
{{- end }}
