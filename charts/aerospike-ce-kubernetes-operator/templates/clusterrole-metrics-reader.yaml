apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aerospike-ce-kubernetes-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "aerospike-ce-kubernetes-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - "/metrics"
    verbs:
      - get
