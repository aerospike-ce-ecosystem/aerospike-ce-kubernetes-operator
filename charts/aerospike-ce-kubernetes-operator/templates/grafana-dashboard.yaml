{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aerospike-ce-kubernetes-operator.fullname" . }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aerospike-ce-kubernetes-operator.labels" . | nindent 4 }}
    {{ .Values.grafanaDashboard.sidecarLabel }}: {{ .Values.grafanaDashboard.sidecarLabelValue | quote }}
  {{- if .Values.grafanaDashboard.folder }}
  annotations:
    grafana_folder: {{ .Values.grafanaDashboard.folder | quote }}
  {{- end }}
data:
  acko.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Reconcile Total (rate)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(controller_runtime_reconcile_total{controller=\"aerospikecluster\"}[5m])",
              "legendFormat": "{{`{{result}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ops" }
          }
        },
        {
          "title": "Reconcile Errors (rate)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "rate(controller_runtime_reconcile_errors_total{controller=\"aerospikecluster\"}[5m])",
              "legendFormat": "errors"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ops", "color": { "mode": "fixed", "fixedColor": "red" } }
          }
        },
        {
          "title": "Reconcile Duration (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(controller_runtime_reconcile_time_seconds_bucket{controller=\"aerospikecluster\"}[5m]))",
              "legendFormat": "p99"
            },
            {
              "expr": "histogram_quantile(0.50, rate(controller_runtime_reconcile_time_seconds_bucket{controller=\"aerospikecluster\"}[5m]))",
              "legendFormat": "p50"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "title": "Work Queue Depth",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "workqueue_depth{name=\"aerospikecluster\"}",
              "legendFormat": "depth"
            }
          ]
        },
        {
          "title": "Operator Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{container=\"manager\", pod=~\".*acko.*\"}",
              "legendFormat": "{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        },
        {
          "title": "Operator CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{container=\"manager\", pod=~\".*acko.*\"}[5m])",
              "legendFormat": "{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit" }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["aerospike", "operator", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Aerospike Operator",
      "uid": "aerospike-operator"
    }
{{- end }}
