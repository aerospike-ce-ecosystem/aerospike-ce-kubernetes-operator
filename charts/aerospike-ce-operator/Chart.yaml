apiVersion: v2
name: aerospike-ce-operator
description: Kubernetes Operator for Aerospike Community Edition clusters
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.26.0-0"
home: https://github.com/kimsoungryoul/aerospike-ce-kubernetes-operator
sources:
  - https://github.com/kimsoungryoul/aerospike-ce-kubernetes-operator
keywords:
  - aerospike
  - operator
  - database
  - nosql
  - kubernetes
maintainers:
  - name: kimsoungryoul
    url: https://github.com/kimsoungryoul
dependencies:
  - name: aerospike-ce-operator-crds
    version: "0.1.0"
    # Local reference for development. CI overrides to OCI registry after pushing aerospike-ce-operator-crds.
    repository: "file://../aerospike-ce-operator-crds"
    condition: crds.install
  - name: cert-manager
    version: v1.17.2
    repository: https://charts.jetstack.io
    condition: cert-manager.install
