apiVersion: v1
kind: Service
metadata:
  name: {{ include "aerospike-ce-operator.metricsServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aerospike-ce-operator.labels" . | nindent 4 }}
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  selector:
    {{- include "aerospike-ce-operator.selectorLabels" . | nindent 4 }}
