apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aerospike-cluster-manager.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aerospike-cluster-manager.labels" . | nindent 4 }}
data:
  CORS_ORIGINS: {{ .Values.env.corsOrigins | quote }}
  LOG_LEVEL: {{ .Values.env.logLevel | quote }}
  K8S_MANAGEMENT_ENABLED: {{ .Values.k8s.enabled | quote }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@localhost:5432/%s" .Values.postgresql.username .Values.postgresql.password .Values.postgresql.database | quote }}
  {{- else if .Values.env.databaseUrl }}
  DATABASE_URL: {{ .Values.env.databaseUrl | quote }}
  {{- end }}
