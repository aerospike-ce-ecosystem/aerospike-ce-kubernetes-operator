apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aerospike-operator.fullname" . }}-metrics-auth
  labels:
    {{- include "aerospike-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aerospike-operator.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "aerospike-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
