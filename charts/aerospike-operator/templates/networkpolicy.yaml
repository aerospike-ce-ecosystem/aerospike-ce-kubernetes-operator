{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aerospike-operator.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aerospike-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "aerospike-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              metrics: enabled
      ports:
        - port: 8443
          protocol: TCP
    {{- if .Values.webhook.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              webhooks: enabled
      ports:
        - port: {{ .Values.webhook.port }}
          protocol: TCP
    {{- end }}
{{- end }}
