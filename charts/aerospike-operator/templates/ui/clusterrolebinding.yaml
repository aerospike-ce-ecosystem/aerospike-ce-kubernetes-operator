{{- if and .Values.ui.enabled .Values.ui.rbac.create .Values.ui.k8s.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aerospike-operator.ui.fullname" . }}
  labels:
    {{- include "aerospike-operator.ui.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aerospike-operator.ui.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aerospike-operator.ui.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
