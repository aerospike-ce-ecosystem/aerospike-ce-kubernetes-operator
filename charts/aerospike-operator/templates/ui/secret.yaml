{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aerospike-operator.ui.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aerospike-operator.ui.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.ui.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.ui.postgresql.password | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@localhost:5432/%s" .Values.ui.postgresql.username .Values.ui.postgresql.password .Values.ui.postgresql.database | quote }}
  {{- else }}
  {{- if .Values.ui.env.databaseUrl }}
  DATABASE_URL: {{ .Values.ui.env.databaseUrl | quote }}
  {{- else }}
  {{- fail "ui.postgresql.enabled is false but ui.env.databaseUrl is not set. Provide an external database URL via ui.env.databaseUrl." }}
  {{- end }}
  {{- end }}
{{- end }}
