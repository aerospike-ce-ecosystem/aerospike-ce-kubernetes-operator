{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "aerospike-operator.fullname" . }}-validating
  labels:
    {{- include "aerospike-operator.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "aerospike-operator.certName" . }}
  {{- end }}
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "aerospike-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-acko-io-v1alpha1-aerospikececluster
    failurePolicy: Fail
    name: vaerospikececluster.kb.io
    rules:
      - apiGroups:
          - acko.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - aerospikececlusters
    sideEffects: None
{{- end }}
