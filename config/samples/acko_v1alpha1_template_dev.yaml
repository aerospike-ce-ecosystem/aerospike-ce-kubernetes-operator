apiVersion: acko.io/v1alpha1
kind: AerospikeClusterTemplate
metadata:
  name: minimal
  namespace: default
  labels:
    app.kubernetes.io/profile: minimal
spec:
  # Minimal template: single-node cluster with minimal resources for fast iteration
  image: aerospike:ce-8.1.1.1   # Default image; clusters can override with spec.image
  size: 1                         # Single node; clusters can override with spec.size

  # Monitoring disabled to reduce resource usage
  monitoring:
    enabled: false

  # No anti-affinity: allow multiple pods per node
  scheduling:
    podAntiAffinityLevel: none

  storage:
    storageClassName: standard
    resources:
      requests:
        storage: 1Gi

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  aerospikeConfig:
    service:
      proto-fd-max: 1024
    namespaceDefaults:
      replication-factor: 1
      # memory-size: optional; CE 8.x auto-sizes in-memory namespaces when omitted
