apiVersion: acko.io/v1alpha1
kind: AerospikeClusterTemplate
metadata:
  name: minimal
  namespace: default
  labels:
    app.kubernetes.io/profile: minimal
spec:
  description: >-
    빠른 개발과 설정 검증을 위한 단일 노드 클러스터입니다.
    스토리지 I/O 성능이나 네트워크 지연은 고려하지 않으며, 빠른 기동과 최소한의 리소스 소비를 우선합니다.
    내구성보다 기능 동작이 중요한 로컬 또는 임시 개발 환경에 적합합니다.

  image: aerospike:ce-8.1.1.1   # Default image; clusters can override with spec.image
  size: 1                         # Single node; clusters can override with spec.size

  # Monitoring disabled to reduce resource usage
  monitoring:
    enabled: false

  # No anti-affinity: allow multiple pods per node
  scheduling:
    podAntiAffinityLevel: none

  storage:
    storageClassName: standard
    resources:
      requests:
        storage: 1Gi

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  aerospikeConfig:
    service:
      proto-fd-max: 1024
    namespaceDefaults:
      replication-factor: 1
      # data-size: optional; CE 8.x auto-sizes in-memory namespaces when omitted
