apiVersion: acko.io/v1alpha1
kind: AerospikeCEClusterTemplate
metadata:
  name: dev
  namespace: default
  labels:
    environment: dev
spec:
  # Dev template: default image and single-node cluster for fast iteration
  image: aerospike:ce-8.1.1.1   # Default image; clusters can override with spec.image
  size: 1                         # Single node for dev; clusters can override with spec.size

  # Monitoring disabled in dev to reduce resource usage
  monitoring:
    enabled: false

  # Dev template: minimal resource usage, no strict anti-affinity
  scheduling:
    podAntiAffinityLevel: none   # Allow multiple pods per node in dev

  storage:
    storageClassName: standard
    resources:
      requests:
        storage: 1Gi

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  aerospikeConfig:
    service:
      proto-fd-max: 1024
    namespaceDefaults:
      replication-factor: 1
      # memory-size: optional; CE 8.x auto-sizes in-memory namespaces when omitted
