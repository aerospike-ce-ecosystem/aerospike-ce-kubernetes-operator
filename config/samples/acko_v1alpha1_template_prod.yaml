apiVersion: acko.io/v1alpha1
kind: AerospikeClusterTemplate
metadata:
  name: hard-rack
  namespace: default
  labels:
    app.kubernetes.io/profile: hard-rack
spec:
  description: >-
    엄격한 랙 격리를 보장하는 프로덕션 등급 클러스터입니다.
    쿠버네티스 노드당 하나의 랙(required 안티어피니티)과 랙별 로컬 PVC 바인딩을 강제하며, 장애 내구성을 위해 최소 3개 랙을 권장합니다.
    프로덕션 환경에서 요구되는 완전한 데이터 로컬리티와 장애 도메인 격리를 보장합니다.

  image: aerospike:ce-8.1.1.1   # Default image; clusters can override with spec.image
  size: 6                         # Default cluster size; clusters can override with spec.size

  # Monitoring: Prometheus exporter sidecar with ServiceMonitor
  monitoring:
    enabled: true
    port: 9145
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    serviceMonitor:
      enabled: true
      interval: 30s

  # Default network access policy
  aerospikeNetworkPolicy:
    accessType: pod
    alternateAccessType: pod
    fabricType: pod

  # Hard-rack: full resources, required anti-affinity, local PV
  scheduling:
    podAntiAffinityLevel: required   # Hard anti-affinity: one pod per node
    tolerations:
      - key: "aerospike"
        operator: "Exists"
        effect: "NoSchedule"
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "aerospike"
                operator: In
                values:
                  - "true"

  storage:
    storageClassName: local-path     # Local storage for performance
    localPVRequired: true            # Enforce WaitForFirstConsumer binding
    resources:
      requests:
        storage: 100Gi

  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"              # Guaranteed QoS: requests == limits
      memory: "4Gi"

  rackConfig:
    maxRacksPerNode: 1   # One rack per node (enforced with required anti-affinity)

  aerospikeConfig:
    service:
      proto-fd-max: 15000
    namespaceDefaults:
      data-size: 2147483648   # 2GiB default per namespace
      replication-factor: 2
    network:
      heartbeat:
        mode: mesh
        interval: 150
        timeout: 10
