apiVersion: acko.io/v1alpha1
kind: AerospikeClusterTemplate
metadata:
  name: soft-rack
  namespace: default
  labels:
    app.kubernetes.io/profile: soft-rack
spec:
  # Soft-rack template: moderate resources, preferred anti-affinity
  scheduling:
    podAntiAffinityLevel: preferred   # Soft anti-affinity for better spread
    tolerations:
      - key: "aerospike"
        operator: "Exists"
        effect: "NoSchedule"

  storage:
    storageClassName: local-path     # Local storage: PVC is bound to the node where the pod is scheduled
    localPVRequired: true            # Enforce WaitForFirstConsumer binding mode
    resources:
      requests:
        storage: 10Gi

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  aerospikeConfig:
    service:
      proto-fd-max: 4096
    namespaceDefaults:
      replication-factor: 2
      # data-size: optional; CE 8.x auto-sizes in-memory namespaces when omitted
    network:
      heartbeat:
        mode: mesh
        interval: 150
        timeout: 10
