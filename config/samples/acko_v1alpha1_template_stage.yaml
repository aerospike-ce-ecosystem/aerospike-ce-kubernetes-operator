apiVersion: acko.io/v1alpha1
kind: AerospikeClusterTemplate
metadata:
  name: soft-rack
  labels:
    app.kubernetes.io/profile: soft-rack
spec:
  description: >-
    스테이징 환경 추천. 멀티 랙(3 랙 이상)으로 배포하며 로컬 PVC를 보장합니다.
    단, 동일한 쿠버네티스 노드에 여러 랙(Aerospike 파드)이 함께 배포될 수 있어 노드 수준의 완전한 격리는 보장하지 않습니다.

  size: 3   # 스테이징 권장 3-rack 구성; 클러스터 생성 시 spec.size로 재정의 가능

  scheduling:
    podAntiAffinityLevel: preferred   # Soft anti-affinity for better spread
    tolerations:
      - key: "aerospike"
        operator: "Exists"
        effect: "NoSchedule"

  storage:
    storageClassName: local-path     # Local storage: PVC is bound to the node where the pod is scheduled
    localPVRequired: true            # Enforce WaitForFirstConsumer binding mode
    resources:
      requests:
        storage: 10Gi

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  aerospikeConfig:
    service:
      proto-fd-max: 4096
    namespaceDefaults:
      replication-factor: 2
      # data-size: optional; CE 8.x auto-sizes in-memory namespaces when omitted
    network:
      heartbeat:
        mode: mesh
        interval: 150
        timeout: 10
