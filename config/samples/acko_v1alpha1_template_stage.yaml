apiVersion: acko.io/v1alpha1
kind: AerospikeClusterTemplate
metadata:
  name: soft-rack
  namespace: default
  labels:
    app.kubernetes.io/profile: soft-rack
spec:
  description: >-
    로컬 PVC 바인딩과 소프트 파드 안티어피니티를 적용한 멀티 랙 클러스터입니다.
    용량 여유가 있을 때 파드를 다른 노드에 분산 배치하지만, 동일한 쿠버네티스 노드에 여러 랙이 공존할 수 있습니다.
    리소스가 제한된 환경에서도 스케줄링 유연성을 유지하면서 스테이징에 적합한 실제적인 랙 토폴로지를 제공합니다.

  scheduling:
    podAntiAffinityLevel: preferred   # Soft anti-affinity for better spread
    tolerations:
      - key: "aerospike"
        operator: "Exists"
        effect: "NoSchedule"

  storage:
    storageClassName: local-path     # Local storage: PVC is bound to the node where the pod is scheduled
    localPVRequired: true            # Enforce WaitForFirstConsumer binding mode
    resources:
      requests:
        storage: 10Gi

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  aerospikeConfig:
    service:
      proto-fd-max: 4096
    namespaceDefaults:
      replication-factor: 2
      # data-size: optional; CE 8.x auto-sizes in-memory namespaces when omitted
    network:
      heartbeat:
        mode: mesh
        interval: 150
        timeout: 10
