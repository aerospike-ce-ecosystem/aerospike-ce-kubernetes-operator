# NOTE: Aerospike CE 8.x does NOT support the 'security' stanza.
#       ACL (Access Control / RBAC) is an Enterprise Edition (EE) feature.
#       This sample demonstrates a 3-node cluster with PV storage instead.
#       For ACL functionality, use an Aerospike Enterprise Edition image.
apiVersion: acko.io/v1alpha1
kind: AerospikeCECluster
metadata:
  name: aerospike-ce-acl
  namespace: aerospike
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  storage:
    volumes:
      - name: data-vol
        source:
          persistentVolume:
            storageClass: standard
            size: 10Gi
        aerospike:
          path: /opt/aerospike/data
        cascadeDelete: true

  aerospikeConfig:
    service:
      cluster-name: aerospike-ce-acl
      proto-fd-max: 15000

    network:
      service:
        address: any
        port: 3000
      heartbeat:
        mode: mesh
        port: 3002
      fabric:
        address: any
        port: 3001

    namespaces:
      - name: testns
        replication-factor: 2
        storage-engine:
          type: device
          file: /opt/aerospike/data/testns.dat
          filesize: 4294967296

    logging:
      - name: /var/log/aerospike/aerospike.log
        context: any info
