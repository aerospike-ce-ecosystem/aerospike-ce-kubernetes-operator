# 6-node Aerospike CE cluster with multi-rack topology-aware scheduling.
# Each rack maps to a different availability zone for fault isolation.
# The operator creates a separate StatefulSet per rack (e.g., aerospike-multirack-1,
# aerospike-multirack-2, aerospike-multirack-3) and distributes pods evenly.
# With size=6 and 3 racks, each rack gets 2 pods.
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: aerospike-multirack
  namespace: aerospike  # Create namespace first: kubectl create namespace aerospike
spec:
  size: 6  # Total pods across all racks (6 / 3 racks = 2 pods per rack)
  image: aerospike:ce-8.1.1.1

  # Rack-aware deployment configuration.
  # Aerospike uses rack IDs to ensure replicas are placed on different racks,
  # so a single zone failure does not cause data loss.
  rackConfig:
    namespaces:
      - testns  # Namespaces that are rack-aware (must match aerospikeConfig namespaces)
    racks:
      - id: 1
        zone: us-east1-a  # Pins rack-1 pods to this availability zone
      - id: 2
        zone: us-east1-b  # Pins rack-2 pods to a different zone
      - id: 3
        zone: us-east1-c  # Pins rack-3 pods to a third zone

  podSpec:
    aerospikeContainer:
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
        limits:
          memory: "1Gi"
          cpu: "500m"

  storage:
    volumes:
      - name: data-vol
        source:
          persistentVolume:
            storageClass: standard
            size: 5Gi
        aerospike:
          path: /opt/aerospike/data
        cascadeDelete: false  # Retain PVCs after CR deletion (manual cleanup required)

  aerospikeConfig:
    service:
      cluster-name: aerospike-multirack
      proto-fd-max: 15000

    network:
      service:
        address: any
        port: 3000
      heartbeat:
        mode: mesh
        port: 3002
      fabric:
        address: any
        port: 3001

    namespaces:
      - name: testns
        replication-factor: 2  # Each record on 2 nodes, ideally in different racks/zones
        storage-engine:
          type: device
          file: /opt/aerospike/data/testns.dat
          filesize: 4294967296  # 4 GiB
