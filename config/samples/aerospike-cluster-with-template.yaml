---
# Example: Cluster using the 'stage' template with minimal overrides.
# The template provides default scheduling, storage, and Aerospike config.
# The cluster only specifies its unique fields (size, image, namespace config).
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: stage-cluster
  namespace: default
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  # Reference the stage template
  templateRef:
    name: stage

  # Override only what differs from the template
  overrides:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "2Gi"

  aerospikeConfig:
    namespaces:
      - name: data
        memory-size: 1073741824   # 1GiB — overrides template namespaceDefaults
        storage-engine:
          type: memory

---
# Example: Cluster using the 'dev' template — no overrides needed.
# Great for quick development/testing environments.
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: dev-cluster
  namespace: default
spec:
  size: 1
  image: aerospike:ce-8.1.1.1

  # Reference the dev template
  templateRef:
    name: dev

  aerospikeConfig:
    namespaces:
      - name: test
        storage-engine:
          type: memory

---
# Example: Cluster that relies entirely on the 'dev' template for image and size.
# spec.image and spec.size are omitted — the template's image and size defaults apply.
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: dev-cluster-minimal
  namespace: default
spec:
  # No image or size specified — the dev template provides:
  #   image: aerospike:ce-8.1.1.1
  #   size: 1
  templateRef:
    name: dev

  aerospikeConfig:
    namespaces:
      - name: test
        storage-engine:
          type: memory

---
# Example: Resync a cluster after the template was updated.
# Add this annotation to trigger a one-time template resync:
#   kubectl annotate aerospikecluster stage-cluster acko.io/resync-template=true
#
# The operator will re-fetch the template, update the snapshot in status,
# and fire a TemplateApplied event. The annotation is removed after resync.
