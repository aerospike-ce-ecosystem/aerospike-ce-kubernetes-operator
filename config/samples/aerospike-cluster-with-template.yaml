---
# Example: Cluster using the 'soft-rack' template with minimal overrides.
# The template provides default scheduling, storage, and Aerospike config.
# The cluster only specifies its unique fields (size, image, namespace config).
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: soft-rack-cluster
  namespace: default
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  # Reference the soft-rack template
  templateRef:
    name: soft-rack

  # 3 racks spread across nodes with preferred anti-affinity.
  # Multiple racks may share the same node (soft), but each rack gets its own local PVC.
  rackConfig:
    namespaces:
      - data
    racks:
      - id: 1
      - id: 2
      - id: 3

  # Override only what differs from the template
  overrides:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "2Gi"

  aerospikeConfig:
    namespaces:
      - name: data
        data-size: 1073741824   # 1GiB — overrides template namespaceDefaults
        storage-engine:
          type: memory

---
# Example: Cluster using the 'minimal' template — no overrides needed.
# Great for quick development/testing environments.
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: minimal-cluster
  namespace: default
spec:
  size: 1
  image: aerospike:ce-8.1.1.1

  # Reference the minimal template
  templateRef:
    name: minimal

  aerospikeConfig:
    namespaces:
      - name: test
        storage-engine:
          type: memory

---
# Example: Cluster that relies entirely on the 'minimal' template for image and size.
# spec.image and spec.size are omitted — the template's image and size defaults apply.
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: minimal-cluster-slim
  namespace: default
spec:
  # No image or size specified — the minimal template provides:
  #   image: aerospike:ce-8.1.1.1
  #   size: 1
  templateRef:
    name: minimal

  aerospikeConfig:
    namespaces:
      - name: test
        storage-engine:
          type: memory

---
# Example: Cluster using the 'hard-rack' template — 1 k8s node : 1 rack, local PVC guaranteed.
# The template enforces required anti-affinity so each rack lands on a distinct node.
# local-path storage with WaitForFirstConsumer ensures the PVC is created on the scheduled node.
apiVersion: acko.io/v1alpha1
kind: AerospikeCluster
metadata:
  name: hard-rack-cluster
  namespace: default
spec:
  size: 3
  image: aerospike:ce-8.1.1.1

  # Reference the hard-rack template (provides: required anti-affinity, local-path PVC, maxRacksPerNode=1)
  templateRef:
    name: hard-rack

  # 3 racks, one per node (enforced by required anti-affinity from the template)
  rackConfig:
    namespaces:
      - data
    racks:
      - id: 1
      - id: 2
      - id: 3

  aerospikeConfig:
    namespaces:
      - name: data
        replication-factor: 2
        storage-engine:
          type: device
          file: /opt/aerospike/data/data.dat
          filesize: 2147483648   # 2GiB

---
# Example: Resync a cluster after the template was updated.
# Add this annotation to trigger a one-time template resync:
#   kubectl annotate aerospikecluster soft-rack-cluster acko.io/resync-template=true
#
# The operator will re-fetch the template, update the snapshot in status,
# and fire a TemplateApplied event. The annotation is removed after resync.
