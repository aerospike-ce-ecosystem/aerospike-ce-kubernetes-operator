---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-asdbce-aerospike-com-v1alpha1-aerospikececluster
  failurePolicy: Fail
  name: maerospikececluster.kb.io
  rules:
  - apiGroups:
    - asdbce.aerospike.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - aerospikececlusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-asdbce-aerospike-com-v1alpha1-aerospikececluster
  failurePolicy: Fail
  name: vaerospikececluster.kb.io
  rules:
  - apiGroups:
    - asdbce.aerospike.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - aerospikececlusters
  sideEffects: None
